<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM-Doc - 学术文档智能处理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                <h2>LLM-Doc</h2>
            </div>
            
            <nav class="nav-menu">
                <a href="/" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span>文件处理</span>
                </a>
                <a href="/settings" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span>系统设置</span>
                </a>
                <a href="/prompts" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20h9"/>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                    <span>提示词配置</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <span class="version">v1.0.0</span>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <header class="header">
                <h1>学术文档智能处理</h1>
                <button class="btn btn-text" onclick="shutdownServer()" style="color: #f56c6c;" title="关闭服务">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
                        <line x1="12" y1="2" x2="12" y2="12"/>
                    </svg>
                    关闭服务
                </button>
            </header>
            
            <div class="content-wrapper">
                <div class="row">
                    <!-- 左侧：文件上传 -->
                    <div class="col">
                        <div class="card">
                            <div class="card-header">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="17 8 12 3 7 8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                                <span>上传文件</span>
                            </div>
                            
                            <div class="upload-area" id="uploadArea">
                                <input type="file" id="fileInput" accept=".txt,.docx" hidden>
                                <div class="upload-content">
                                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="upload-icon">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                        <polyline points="17 8 12 3 7 8"/>
                                        <line x1="12" y1="3" x2="12" y2="15"/>
                                    </svg>
                                    <p class="upload-text">将文件拖到此处，或<em>点击上传</em></p>
                                    <p class="upload-hint">支持 .txt 和 .docx 格式，最大 500MB</p>
                                    <p class="upload-hint" style="color: #e6a23c; margin-top: 4px;">⚠️ 不支持旧版 .doc 格式，请在 Word 中另存为 .docx 后上传</p>
                                </div>
                            </div>
                            
                            <div class="file-info" id="fileInfo" style="display: none;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                </svg>
                                <span id="fileName"></span>
                                <span class="file-size" id="fileSize"></span>
                            </div>

                            <!-- 已上传文件列表 -->
                            <div class="uploaded-files-compact" id="uploadedFilesCompact">
                                <div class="compact-header">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                                    </svg>
                                    <span>已上传文件</span>
                                    <button class="btn btn-text btn-xs" onclick="loadUploadedFiles()">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="23 4 23 10 17 10"/>
                                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                                        </svg>
                                    </button>
                                </div>
                                <div class="compact-list" id="uploadedFilesCompactList">
                                    <div class="compact-empty" id="compactEmpty">
                                        <span>暂无已上传文件</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧：处理配置 -->
                    <div class="col">
                        <div class="card">
                            <div class="card-header">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="3"/>
                                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                                </svg>
                                <span>处理配置</span>
                            </div>
                            
                            <div class="config-section">
                                <label class="config-label">处理模式</label>
                                <div class="radio-group">
                                    <label class="radio-item">
                                        <input type="radio" name="mode" value="full">
                                        <span class="radio-label">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                                <polyline points="14 2 14 8 20 8"/>
                                            </svg>
                                            全文模式
                                        </span>
                                    </label>
                                    <label class="radio-item">
                                        <input type="radio" name="mode" value="chapter">
                                        <span class="radio-label">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                                            </svg>
                                            章节模式
                                        </span>
                                    </label>
                                    <label class="radio-item">
                                        <input type="radio" name="mode" value="paragraph" checked>
                                        <span class="radio-label">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                            </svg>
                                            段落模式
                                        </span>
                                    </label>
                                </div>
                            </div>
                            
                            <div class="alert alert-info" id="modeDesc">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <line x1="12" y1="16" x2="12" y2="12"/>
                                    <line x1="12" y1="8" x2="12.01" y2="8"/>
                                </svg>
                                <span>段落模式：按段落拆分后逐段送入 LLM，适用于语法检查和润色</span>
                            </div>

                            <!-- 全文模式版本 -->
                            <div class="config-section version-section" id="versionSection-full" style="display: none;">
                                <label class="config-label">全文模式版本</label>
                                <select id="version-full" class="input">
                                    <!-- 动态加载 -->
                                </select>
                                <p class="config-hint" id="versionHint-full">可用版本将在加载后显示</p>
                            </div>

                            <!-- 章节模式版本 -->
                            <div class="config-section version-section" id="versionSection-chapter" style="display: none;">
                                <label class="config-label">章节模式版本</label>
                                <select id="version-chapter" class="input">
                                    <!-- 动态加载 -->
                                </select>
                                <p class="config-hint" id="versionHint-chapter">可用版本将在加载后显示</p>
                            </div>

                            <!-- 段落模式版本 -->
                            <div class="config-section version-section" id="versionSection-paragraph" style="display: none;">
                                <label class="config-label">段落模式版本</label>
                                <select id="version-paragraph" class="input">
                                    <!-- 动态加载 -->
                                </select>
                                <p class="config-hint" id="versionHint-paragraph">可用版本将在加载后显示</p>
                            </div>
                            
                            <div class="config-section">
                                <label class="config-label">输出文件名（可选）</label>
                                <input type="text" id="outputFilename" class="input" placeholder="留空则自动生成">
                            </div>
                            
                            <button class="btn btn-primary btn-large btn-block" id="processBtn" disabled>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="5 3 19 12 5 21 5 3"/>
                                </svg>
                                <span>开始处理</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 最近任务列表 -->
                <div class="card" style="margin-top: 24px;">
                    <div class="card-header">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="8" y1="6" x2="21" y2="6"/>
                            <line x1="8" y1="12" x2="21" y2="12"/>
                            <line x1="8" y1="18" x2="21" y2="18"/>
                            <line x1="3" y1="6" x2="3.01" y2="6"/>
                            <line x1="3" y1="12" x2="3.01" y2="12"/>
                            <line x1="3" y1="18" x2="3.01" y2="18"/>
                        </svg>
                        <span>最近任务</span>
                        <span class="task-notice">仅保留最近 20 条记录</span>
                        <button class="btn btn-text" onclick="loadTasks()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"/>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                            </svg>
                            刷新
                        </button>
                    </div>
                    
                    <div class="table-container">
                        <table class="table" id="taskTable">
                            <thead>
                                <tr>
                                    <th>任务 ID</th>
                                    <th>文件名</th>
                                    <th>模式</th>
                                    <th>进度</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="taskTableBody">
                                <tr>
                                    <td colspan="6" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                            <polyline points="13 2 13 9 20 9"/>
                        </svg>
                        <p>暂无任务记录</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 通知容器 -->
    <div id="notificationContainer"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
